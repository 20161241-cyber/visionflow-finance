name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:  # Permite ejecutarlo manualmente desde la web de GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Flet CLI
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Ensure Python packages are recognized
        run: |
          # Asegurar que los __init__.py existan
          touch ui/__init__.py core/__init__.py

      - name: Build Flet APK
        run: |
          flet build apk \
            --project "VisionFlow Finance" \
            --org com.visionflow.finance \
            --product "VisionFlow Finance"
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisionFlow-Finance-APK
          path: build/apk/**/*.apk
          if-no-files-found: warn
